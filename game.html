<!DOCTYPE html>
<html>
<head>
  <title>Dino Game 🦖</title>

  <style>
    body {
      background: #111;
      text-align: center;
      color: white;
      font-family: Arial;
    }

    h1 {
      margin-top: 20px;
    }

    .game {
      width: 500px;
      height: 200px;
      border: 2px solid white;
      margin: 40px auto;
      position: relative;
      overflow: hidden;
    }

    /* 🦖 DINO */
    .player {
      width: 60px;
      height: 60px;
      background: url("clipart3004247.png") no-repeat center;
      background-size: contain;
      position: absolute;
      bottom: 0;
      left: 50px;
    }

    /* 🌵 CACTUS */
    .obstacle {
      width: 60px;
      height: 80px;
      background: url("cactus.png") no-repeat center;
      background-size: contain;
      position: absolute;
      bottom: 0;
      right: 0;
      --speed: 3s;
      animation: move var(--speed) linear infinite;
    image-rendering: auto;} 

    @keyframes move {
      from { right: -40px; }
      to { right: 100%; }
    }

    /* ⬆️ JUMP */
    .jump {
      animation: jump 0.7s;
    }

    @keyframes jump {
      0% { bottom: 0; }
      40% { bottom: 130px; }
      60% { bottom: 130px; }
      100% { bottom: 0; }
    }

    #scoreBox {
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>🦖 Dino Game</h1>

<div id="scoreBox">Score: <span id="score">0</span></div>

<div class="game">
  <div class="player" id="player"></div>
  <div class="obstacle" id="obstacle"></div>
</div>

<p>⬆️ Arrow = Jump | SPACE = Restart</p>

<script>
let player = document.getElementById("player");
let obstacle = document.getElementById("obstacle");
let score = 0;
let speed = 3;

let isJumping = false;
let isGameOver = false;

// ⭐ SCORE
let scoreInterval = setInterval(() => {
  if (!isGameOver) {
    score++;
    document.getElementById("score").innerText = score;
  }
}, 500);

// ⚡ SPEED INCREASE
setInterval(() => {
  if (!isGameOver) {
    speed -= 0.2;
    if (speed < 1) speed = 1;
    obstacle.style.setProperty('--speed', speed + 's');
  }
}, 2000);

// ⌨️ CONTROLS
document.addEventListener("keydown", function(e) {

  // Restart
  if (isGameOver && e.code === "Space") {
    location.reload();
  }

  // Jump
  if (e.key === "ArrowUp" && !isJumping && !isGameOver) {
    isJumping = true;
    player.classList.add("jump");

    setTimeout(() => {
      player.classList.remove("jump");
      isJumping = false;
    }, 700);
  }
});

// 💥 COLLISION
let gameLoop = setInterval(() => {

  if (isGameOver) return;

  let playerBottom = parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));
  let obstacleLeft = parseInt(window.getComputedStyle(obstacle).getPropertyValue("left"));

  if (obstacleLeft > 80 && obstacleLeft < 110 && playerBottom < 40) {

    isGameOver = true;

    document.querySelector(".game").innerHTML =
      "<h2>💥 Game Over</h2><p>Score: " + score + "</p><p>Press SPACE to Restart</p>";

  }

}, 10);
</script>

</body>
</html>
