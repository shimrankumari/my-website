
  <!DOCTYPE html>
<html>
<head>
  <title>Game 🎮</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 20px;
    }

    .game-box {
      width: 300px;
      height: 300px;
      background: #111;
      margin: 50px auto;
      position: relative;
      border: 2px solid #00c6ff;
      box-shadow: 0 0 20px #00c6ff;
    }

    .player {
      width: 30px;
      height: 30px;
      background: #00c6ff;
      position: absolute;
      top: 130px;
      left: 130px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>🎮 My Game</h1>

<div class="game-box">
  <div class="player" id="player"></div>
</div>

<p>Use Arrow Keys ⬅️➡️⬆️</p>

<script>
let player = document.getElementById("player");
let x = 130;
let y = 130;

document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowLeft") x -= 10;
  if (e.key === "ArrowRight") x += 10;
  if (e.key === "ArrowUp") y -= 10;
  if (e.key === "ArrowDown") y += 10;

  player.style.left = x + "px";
  player.style.top = y + "px";
});
</script>

</body>
</html>
