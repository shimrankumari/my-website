<!DOCTYPE html>
<html>
<head>
  <title>My Game 🎮</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #000428, #004e92, #00c6ff);
      color: white;
      text-align: center;
      font-family: Arial;
    }

    .navbar {
      background: rgba(0,0,0,0.6);
      padding: 15px;
    }

    .navbar a {
      color: white;
      margin: 0 20px;
      text-decoration: none;
      font-size: 20px;
    }

    .navbar a:hover {
      color: #00c6ff;
    }

    .box {
      margin-top: 80px;
      padding: 30px;
      border: 2px solid white;
      display: inline-block;
      border-radius: 10px;
    }

    .controls {
      margin-top: 20px;
    }

    .controls button {
      font-size: 25px;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: #00c6ff;
    }
  </style>
</head>

<body>

<div class="navbar">
  <a href="index.html">Home</a>
  <a href="game.html">Game</a>
  <a href="about.html">About</a>
</div>

<h1>🎮 My Game</h1>

<div class="box">
  <h2>Game Coming Soon 🚀</h2>
</div>

<!-- 🎮 Controls -->
<div class="controls">
  <button onclick="moveLeft()">⬅️</button>
  <button onclick="moveRight()">➡️</button>
  <button onclick="jump()">⬆️</button>
</div>

<script>
function moveLeft() {
  alert("Move Left ⬅️");
}

function moveRight() {
  alert("Move Right ➡️");
}

function jump() {
  alert("Jump ⬆️");
}

document.addEventListener("keydown", function(event) {
  if (event.key === "ArrowLeft") moveLeft();
  if (event.key === "ArrowRight") moveRight();
  if (event.key === "ArrowUp") jump();
});
</script>

</body>
</html>
