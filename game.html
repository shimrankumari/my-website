
<!DOCTYPE html>
<html>
<head>
  <title>Dino Game 🦖</title>

  <style>
    body {
      background: #111;
      text-align: center;
      color: white;
      font-family: Arial;
    }

    .game {
      width: 400px;
      height: 200px;
      border: 2px solid white;
      margin: 50px auto;
      position: relative;
      overflow: hidden;
    }

    .player {
      width: 30px;
      height: 30px;
      background: cyan;
      position: absolute;
      bottom: 0;
      left: 50px;
    }

    .obstacle {
      width: 20px;
      height: 40px;
      background: red;
      position: absolute;
      bottom: 0;
      right: 0;
  animation: move 4s linear infinite;
    }

    @keyframes move {
      from { right: -20px; }
      to { right: 420px; }
    }

    .jump {
      animation: jump 0.5s;
    }
@keyframes jump {
  0% { bottom: 0; }
 50% { bottom: 150px; }
   100% { bottom: 0; }
}
   
    }
  </style>
</head>

<body>

<h1>🦖 Dino Game</h1>

<div class="game">
  <div class="player" id="player"></div>
  <div class="obstacle" id="obstacle"></div>
</div>

<p>Press SPACE or ⬆️ to jump</p>

<script>
let player = document.getElementById("player");
let obstacle = document.getElementById("obstacle");

// Jump
document.addEventListener("keydown", function(e) {
  if (e.code === "Space" || e.key === "ArrowUp") {
    if (!player.classList.contains("jump")) {
      player.classList.add("jump");
      setTimeout(() => player.classList.remove("jump"), 500);
    }
  }
});

// Collision detection
setInterval(() => {
  let playerBottom = parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));
  let obstacleLeft = parseInt(window.getComputedStyle(obstacle).getPropertyValue("left"));

 
  if (obstacleLeft > 50 && obstacleLeft < 70 && playerBottom < 20) {
  document.querySelector(".game").innerHTML = "<h2>💥 Game Over</h2><p>Refresh to Restart</p>"; 
  }
}, 10);
</script>

</body>
</html>
